<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mastra Design Agent</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="stage" aria-label="Live preview">
      <div id="preview-frame" class="preview__frame"></div>
    </main>

    <button id="debug-toggle" class="debug-toggle" type="button" aria-pressed="false" aria-controls="debug-drawer">
      debug
    </button>

    <section id="debug-drawer" class="debug-drawer" aria-label="Debug transcript" hidden>
      <header class="debug-drawer__header">
        <span>Transcript &amp; tool calls</span>
        <button id="debug-clear" type="button" class="ghost">Clear</button>
      </header>
      <ol id="log" class="debug-drawer__log"></ol>
    </section>

    <script type="module" src="/app.js"></script>
  </body>
</html>
